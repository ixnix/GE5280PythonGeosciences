name: Deploy Jupyter Book

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install "jupyter-book<1" sphinx-book-theme

      - name: Build Jupyter Book
        run: jupyter-book build .

      - name: Copy image directories to build output
        run: |
          for dir in module_*/img; do
            if [ -d "$dir" ]; then
              module=$(dirname "$dir")
              mkdir -p "_build/html/$module/img"
              cp -r "$dir"/* "_build/html/$module/img/"
            fi
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
